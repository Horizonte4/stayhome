name: Estayhome CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-quality:
    name: Backend Quality (Django + Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff bandit pip-audit

      - name: Lint & format check (Ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Security scan (Bandit)
        run: |
          bandit -r . \
            --severity-level medium \
            --exclude ./.ruff_cache,./media,./static,./locale \
            -x ./tests \
            --skip B101,B311

      - name: Vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Run tests (Pytest)
        run: python -m pytest --tb=short
        env:
          DJANGO_SETTINGS_MODULE: stayhome.settings
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "True"

  frontend-quality:
    name: Frontend Quality (HTML Templates)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Create HTMLHint config for Django templates
        run: |
          cat > .htmlhintrc << 'EOF'
          {
            "doctype-first": false,
            "attr-lowercase": false,
            "attr-value-double-quotes": true,
            "tag-pair": true,
            "spec-char-escape": false,
            "id-unique": true,
            "src-not-empty": true,
            "title-require": false
          }
          EOF

      - name: Lint HTML templates
        run: |
          htmlhint "templates/**/*.html" --config .htmlhintrc