name: Estayhome CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-quality:
    name: Backend Quality (Django + Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff bandit pip-audit

      - name: Lint & format check (Ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Security scan (Bandit)
        run: |
          bandit -r . \
            --severity-level medium \
            --exclude ./.ruff_cache,./media,./static,./locale \
            -x ./tests \
            --skip B101,B311

      - name: Vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

  frontend-quality:
    name: Frontend Quality (Django Templates)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install djLint
        run: pip install djlint

      - name: Lint Django templates
        run: djlint templates/ --profile=django --check