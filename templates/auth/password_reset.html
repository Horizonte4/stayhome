{% extends 'base.html' %}
{% block title %}Reset Password – StayHome{% endblock %}

{% block content %}
<div class="page">
    <div class="card auth-card">
        <h2 class="section-title" style="text-align:center;">Forgot your password?</h2>
        <p class="section-sub" style="text-align:center;">
            Enter your email to receive a reset link.
        </p>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>
            <button type="submit" class="btn-list full-width">
                Send link
            </button>
            <p class="auth-footer">
                <a href="{% url 'login' %}">Back to login</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
