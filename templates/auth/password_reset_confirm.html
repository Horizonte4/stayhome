<div class="auth-container">
  <div class="auth-card">
    <h2>Nueva contraseña</h2>

    <form method="post">
      {% csrf_token %}

      {{ form.errors }}

      <div class="form-group">
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
      </div>

      <div class="form-group">
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
      </div>

      <button type="submit" class="btn-primary">
        Change password
      </button>
    </form>
  </div>
</div>
