name: Estayhome CI

on:
  push:
    branches: [ main, develop, dev ]
  pull_request:
    branches: [ main, develop, dev ]

jobs:
  backend-quality:
    name: Backend Quality (Django + Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff bandit pip-audit

      - name: Lint & format check (Ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Security scan (Bandit)
        run: |
          bandit -r . \
            --severity-level medium \
            --exclude ./.ruff_cache,./media,./static,./locale \
            -x ./tests \
            --skip B101,B311

      - name: Vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Run tests (Pytest)
        run: python -m pytest --tb=short
        env:
          DJANGO_SETTINGS_MODULE: stayhome.settings
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "True"

  frontend-quality:
    name: Frontend Quality (HTML Templates)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTML/CSS linting tools
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML templates
        run: |
          htmlhint "**/*.html" \
            --ignore "node_modules/**,media/**,static/vendor/**"

      - name: Lint CSS
        run: |
          stylelint "static/**/*.css" \
            --config '{"extends":"stylelint-config-standard"}' \
            --ignore-path .gitignore \
            --allow-empty-input